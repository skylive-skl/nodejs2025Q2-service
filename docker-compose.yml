services:
  postgres:
    image: postgres:latest
    restart: always
    networks:
      - webnet
    ports:
      - ${DB_PORT}:${DB_PORT}
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_NAME}"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    working_dir: /app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    
  node:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    networks:
      - webnet
  


networks:
  webnet:
    driver: bridge